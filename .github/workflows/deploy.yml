name: Deploy NPC Service

# สั่งให้ทำงานทุกครั้งที่มีการ Push โค้ดมาที่เส้นทาง main (ปรับปรุงเพื่อทดลองรันใหม่)
on:
  push:
    branches: [ "main" ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
    - name: เชื่อมต่อเซิร์ฟเวอร์และอัปเดตระบบ
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.SERVER_IP }}
        username: ${{ secrets.SERVER_USER }}
        key: ${{ secrets.SERVER_SSH_KEY }}
        # คำสั่งที่จะรันบนเซิร์ฟเวอร์จริงสำหรับโปรเจกต์ npcservice
        script: |
          cd /var/www/html/npcservice
          git pull origin main
